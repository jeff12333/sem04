<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ONPE - Verificador de Miembros de Mesa</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .container { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; max-width: 400px; width: 100%; }
        h1 { color: #028090; margin-bottom: 1rem; font-size: 1.5rem; }
        p { color: #666; font-size: 0.9rem; margin-bottom: 1.5rem; }
        .upload-area { border: 2px dashed #028090; padding: 20px; border-radius: 8px; margin-bottom: 20px; cursor: pointer; transition: 0.3s; }
        .upload-area:hover { background-color: #e6f2f3; }
        input[type="file"] { margin-bottom: 15px; }
        button { background-color: #028090; color: white; border: none; padding: 12px 25px; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.3s; }
        button:hover { background-color: #026b7a; }
        .footer { margin-top: 20px; font-size: 0.7rem; color: #aaa; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🐳 ONPE Bot Web</h1>
        <p>Sube tu archivo Excel con la columna <strong>"dni"</strong> para verificar miembros de mesa.</p>
        
        <form action="/" method="post" enctype="multipart/form-data">
            <div class="upload-area">
                <input type="file" name="file" accept=".xlsx, .xls" required>
            </div>
            <button type="submit">Procesar y Descargar</button>
        </form>

        <div class="footer">
            Desarrollo de Soluciones en la Nube - Sem04
        </div>
    </div>
</body>
</html>
